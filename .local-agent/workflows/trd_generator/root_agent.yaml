agent_class: SequentialAgent
name: TRDGeneratorPipeline
description: Generates a repository-grounded TRD for an explicitly named registered project, then delivers it through an isolated Git worktree and pull request when supported.
sub_agents:
  - config_path: phases/initial_writer.yaml
  - config_path: phases/refinement_loop.yaml
  - config_path: phases/git_operator.yaml
  - config_path: phases/result_presenter.yaml
